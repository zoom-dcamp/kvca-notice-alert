name: Check New Notice

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

# [추가된 부분] 봇에게 파일 저장(쓰기) 권한을 명시적으로 부여합니다.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # [수정된 부분] 노란색 경고 해결을 위해 v3 -> v4로 업데이트
    - name: 파일 가져오기
      uses: actions/checkout@v4

    # [수정된 부분] 노란색 경고 해결을 위해 v4 -> v5로 업데이트
    - name: 파이썬 설치하기
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: 크롤링 도구(라이브러리) 설치
      run: pip install requests beautifulsoup4

    - name: 파이썬 코드 실행 (메일 발송 여부 확인)
      env:
        GMAIL_ID: ${{ secrets.GMAIL_ID }}
        GMAIL_PW: ${{ secrets.GMAIL_PW }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python main.py

    - name: 최신 글 제목을 GitHub에 다시 저장
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add latest_post.txt
        git commit -m "Update latest post [skip ci]" || echo "No changes to commit"
        git push
