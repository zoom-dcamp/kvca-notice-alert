name: Check New Notice

on:
  schedule:
    # 매일 평일(월~금) 오전 9시에 실행 (UTC 기준 0시 -> 한국시간 +9시간)
    - cron: '0 0 * * 1-5'
  workflow_dispatch: # 버튼으로 수동 실행 가능하게 하는 옵션

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 파일 가져오기
      uses: actions/checkout@v3

    - name: 파이썬 설치하기
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: 크롤링 도구(라이브러리) 설치
      run: pip install requests beautifulsoup4

    - name: 파이썬 코드 실행 (메일 발송 여부 확인)
      env:
        GMAIL_ID: ${{ secrets.GMAIL_ID }}
        GMAIL_PW: ${{ secrets.GMAIL_PW }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
      run: python main.py

    - name: 최신 글 제목을 GitHub에 다시 저장
      # 이 과정이 있어야 다음 실행 때 '이전 글'과 비교할 수 있습니다.
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "action@github.com"
        git add latest_post.txt
        git commit -m "Update latest post [skip ci]" || echo "No changes to commit"
        git push
